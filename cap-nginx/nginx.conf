# cap-nginx 反向代理配置
# 唯一对外 HTTP 入口；反代到 sandbox-net 内各 cap-* 服务。
# 路由契约：specs/001-sandbox-p1-stack/contracts/nginx-routes.md
# 安全：cap_drop ALL + no-new-privileges（FR-007）

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    # 不限制上传大小（cap-agent 文件接口、Jupyter 上传）
    client_max_body_size 0;

    # WebSocket 升级映射：http → ""，websocket → "upgrade"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ----------------------------------------------------------
        # 1. /novnc/ —— noVNC 前端静态文件（本地 alias，不走上游）
        # ----------------------------------------------------------
        location /novnc/ {
            alias /usr/share/novnc/;
            index vnc.html;
            try_files $uri $uri/ /novnc/vnc.html;
        }

        # ----------------------------------------------------------
        # 2. /websockify —— noVNC → VNC 桥（cap-browser:6080，WS）
        # ----------------------------------------------------------
        location /websockify {
            proxy_pass http://cap-browser:6080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            # T072: WS 空闲 5 分钟无数据断开，清理僵尸连接
            proxy_read_timeout 300s;
        }

        # ----------------------------------------------------------
        # 3. /terminal/ —— ttyd Web Terminal（cap-terminal:7681，HTTP+WS）
        # ----------------------------------------------------------
        location /terminal/ {
            proxy_pass http://cap-terminal:7681;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            # T072: WS 空闲 5 分钟无数据断开
            proxy_read_timeout 300s;
        }

        # ----------------------------------------------------------
        # 4. /code-server/ —— VS Code in browser（cap-code:8081）
        # ----------------------------------------------------------
        location /code-server/ {
            proxy_pass http://cap-code:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }

        # ----------------------------------------------------------
        # 5. /jupyter/ —— JupyterLab（cap-jupyter:8888，HTTP+WS）
        # ----------------------------------------------------------
        location /jupyter/ {
            proxy_pass http://cap-jupyter:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
            # kernel 输出不能 buffer，否则延迟
            proxy_buffering off;
        }

        # ----------------------------------------------------------
        # 6. /v1/ —— cap-agent API（health/shell/file）
        # ----------------------------------------------------------
        location /v1/ {
            proxy_pass http://cap-agent:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }

        # ----------------------------------------------------------
        # 7. /gui/ —— cap-agent GUI 截图与动作
        # ----------------------------------------------------------
        location /gui/ {
            proxy_pass http://cap-agent:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }

        # ----------------------------------------------------------
        # 8. /cdp/ —— CDP 反代（cap-agent:9000，HTTP+WS）
        # ----------------------------------------------------------
        location /cdp/ {
            proxy_pass http://cap-agent:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            # T072: WS 空闲 5 分钟无数据断开
            proxy_read_timeout 300s;
            # CDP WS 消息可能较大（截图 base64）
            proxy_buffering off;
        }

        # ----------------------------------------------------------
        # 9. /auth/ —— cap-agent 鉴权（P1 保留路径）
        # ----------------------------------------------------------
        location /auth/ {
            proxy_pass http://cap-agent:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 30s;
        }

        # ----------------------------------------------------------
        # 10. /mcp/sandbox/ —— MCP Streamable HTTP（cap-mcp:8940）
        #     注意：FastMCP 内部端点是 /mcp/sandbox/mcp；这里 proxy_pass 末尾
        #     斜杠让 nginx 替换前缀，客户端访问 /mcp/sandbox/ → cap-mcp:8940/mcp/sandbox/mcp/。
        #     解决 Phase 4 偏离（spec 路径 /mcp/sandbox/ vs 实现 /mcp/sandbox/mcp）。
        # ----------------------------------------------------------
        location /mcp/sandbox/ {
            proxy_pass http://cap-mcp:8940/mcp/sandbox/mcp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }
    }
}
